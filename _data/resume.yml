    website: "https://goodbarber.com"
    startDate: "2020-03-01"
    endDate: ""
    summary: >
      GoodBarber is a no-code app builder platform offering native iOS and Android apps with a strong focus on UI/UX and design systems.
    highlights:
      - "Developed core user-facing features including token-based authentication, push notifications, and caching strategies, improving security, engagement, and app performance."
      - "Expanded the component library and refactored multiple screens to align with an evolving design system, improving UI consistency across the app."
      - "Integrated third-party SDKs including Stripe, Google Ads, Meta Events, and Lottie, improving revenue streams, analytics coverage, and user experience."
      - "Configured workflows using CI/CD tools reducing TestFlight deployment time and improving the testing process."
      - "Introduced AI tooling into development workflows, including local LLM deployment, MCP servers, and custom agents for code generation and documentation."
      - "Created and maintained technical documentation and onboarding guides, facilitating knowledge transfer and mentoring interns and junior developers, reducing new developer ramp-up time."
